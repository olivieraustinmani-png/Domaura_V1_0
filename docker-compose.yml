version: '3.8'

services:
  # ==========================================
  # DATABASE - PostgreSQL
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: domaura_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-domaura_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-domaura_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./03_base_de_donnees/schemas_postgresql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-domaura_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - domaura_network
    restart: unless-stopped

  # ==========================================
  # CACHE & MESSAGE BROKER - Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: domaura_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_production}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - domaura_network
    restart: unless-stopped

  # ==========================================
  # BACKEND API - NestJS
  # ==========================================
  api:
    build:
      context: ./05_microservices_backend
      dockerfile: Dockerfile
    container_name: domaura_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${APP_PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-domaura_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_NAME: ${DB_NAME:-domaura_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_in_production}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ORANGE_MONEY_API_KEY: ${ORANGE_MONEY_API_KEY}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./05_microservices_backend/src:/app/src
      - ./05_microservices_backend/node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - domaura_network
    restart: unless-stopped
    command: npm run start:dev

  # ==========================================
  # FRONTEND WEB - Next.js
  # ==========================================
  web:
    build:
      context: ./04_applications/web_nextjs
      dockerfile: Dockerfile
    container_name: domaura_web
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_APP_URL: ${WEB_URL:-http://localhost:3001}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    ports:
      - "3001:3000"
    volumes:
      - ./04_applications/web_nextjs:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - domaura_network
    restart: unless-stopped
    command: npm run dev

  # ==========================================
  # PHPMYADMIN (optionnel - admin PostgreSQL)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: domaura_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL:-admin@domaura.com}
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - domaura_network
    restart: unless-stopped
    depends_on:
      - postgres

  # ==========================================
  # REDIS COMMANDER (optionnel - admin Redis)
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: domaura_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-change_me_in_production}
    ports:
      - "8081:8081"
    networks:
      - domaura_network
    restart: unless-stopped
    depends_on:
      - redis

  # ==========================================
  # MONITORING - Prometheus (optionnel)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: domaura_prometheus
    volumes:
      - ./09_devops_infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - domaura_network
    restart: unless-stopped

  # ==========================================
  # MONITORING - Grafana (optionnel)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: domaura_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - domaura_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

networks:
  domaura_network:
    driver: bridge
